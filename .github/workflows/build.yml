name: Build and Artifact

on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]

jobs:
  build-server:
    name: Build Server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server -> target

      - name: Build Server
        run: |
          cd server
          cargo build --release --target ${{ matrix.target }}

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.suffix }}
          path: |
            server/target/${{ matrix.target }}/release/server
            server/target/${{ matrix.target }}/release/server.exe
          if-no-files-found: ignore

  package-extension:
    name: Package Extension
    needs: build-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: |
          cd client
          npm install

      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: server-linux
          path: client/server-bin/

      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: server-win.exe
          path: client/server-bin/

      - name: Rename Binaries
        run: |
          mkdir -p client/server-bin
          # Artifact download might put them in subdirectories or keep original names
          find client/server-bin -name "server" -exec mv {} client/server-bin/server-linux \;
          find client/server-bin -name "server.exe" -exec mv {} client/server-bin/server-win.exe \;
          chmod +x client/server-bin/server-linux

      - name: Package VSIX
        run: |
          cd client
          npx vsce package -o ../hearts-of-modding.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: hearts-of-modding.vsix
