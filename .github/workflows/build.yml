name: Build

on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/build.yml'
      - '.github/workflows/server-build.yml'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-server:
    uses: ./.github/workflows/server-build.yml

  package-extension:
    name: Package Extension
    needs: build-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: |
          cd client
          npm install

      - name: Download Linux Binary
        uses: actions/download-artifact@v8
        with:
          name: server-linux
          path: client/server-bin/linux/
      - name: Download Windows Binary
        uses: actions/download-artifact@v8
        with:
          name: server-win.exe
          path: client/server-bin/win/
      - name: Download macOS ARM64 Binary
        uses: actions/download-artifact@v8
        with:
          name: server-macos-arm64
          path: client/server-bin/macos-arm64/

      - name: Finalize Binary Names
        run: |
          mkdir -p client/server-bin
          mv client/server-bin/linux/server client/server-bin/server-linux
          mv client/server-bin/win/server.exe client/server-bin/server-win.exe
          mv client/server-bin/macos-arm64/server client/server-bin/server-macos-arm64
          chmod +x client/server-bin/server-linux client/server-bin/server-macos-arm64

      - name: Copy Resources
        run: |
          cp -r server/assets client/server-bin/
          mv README.md client/README.md
          mv CHANGELOG.md client/CHANGELOG.md

      - name: Lint
        run: |
          cd client
          npm run lint

      - name: Package VSIX
        run: |
          cd client
          npm run compile
          npx vsce package -o ../hearts-of-modding.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: extension-vsix
          path: hearts-of-modding.vsix
