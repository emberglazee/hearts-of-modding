name: Release

on:
  workflow_dispatch:

jobs:
  build-server:
    name: Build Server (${{ matrix.os }} - ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server -> target

      - name: Build Server
        run: |
          cd server
          cargo build --release --target ${{ matrix.target }}

      - name: Upload Binary
        uses: actions/upload-artifact@v7
        with:
          name: server-${{ matrix.suffix }}
          path: |
            server/target/${{ matrix.target }}/release/server
            server/target/${{ matrix.target }}/release/server.exe
          if-no-files-found: ignore

  create-release:
    name: Create Release
    needs: build-server
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./client/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Node Dependencies
        run: |
          cd client
          npm install

      - name: Download Linux Binary
        uses: actions/download-artifact@v8
        with:
          name: server-linux
          path: client/server-bin/linux/
      - name: Download Windows Binary
        uses: actions/download-artifact@v8
        with:
          name: server-win.exe
          path: client/server-bin/win/
      - name: Download macOS ARM64 Binary
        uses: actions/download-artifact@v8
        with:
          name: server-macos-arm64
          path: client/server-bin/macos-arm64/

      - name: Prepare Binaries
        run: |
          mkdir -p client/server-bin
          mv client/server-bin/linux/server client/server-bin/server-linux
          mv client/server-bin/win/server.exe client/server-bin/server-win.exe
          mv client/server-bin/macos-arm64/server client/server-bin/server-macos-arm64
          chmod +x client/server-bin/server-linux client/server-bin/server-macos-arm64
          
          # Copy resources
          cp -r server/Config client/server-bin/
          cp -r server/assets client/server-bin/
          mv README.md client/README.md
          mv CHANGELOG.md client/CHANGELOG.md

      - name: Package VSIX
        run: |
          cd client
          npm run compile
          npx vsce package -o ../hearts-of-modding-${{ steps.get_version.outputs.VERSION }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: v${{ steps.get_version.outputs.VERSION }}
          files: hearts-of-modding-${{ steps.get_version.outputs.VERSION }}.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
