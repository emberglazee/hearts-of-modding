name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-server:
    uses: ./.github/workflows/server-build.yml

  lint-client:
    name: Lint Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: |
          cd client
          npm ci

      - name: Lint
        run: |
          cd client
          npm run lint

  create-release:
    name: Create Release
    needs: [build-server, lint-client]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Node Dependencies
        run: |
          cd client
          npm ci

      - name: Bump Version
        id: bump
        run: |
          cd client

          if [ "${{ inputs.bump }}" != "none" ]; then
            npm version ${{ inputs.bump }} --no-git-tag-version
          fi

          VERSION=$(node -p "require('./package.json').version")

          if [ "${{ inputs.bump }}" != "none" ]; then
            sed -i "0,/^version = .*/s//version = \"$VERSION\"/" ../server/Cargo.toml

            # Regenerate Cargo.lock to reflect the new version
            cd ../server
            cargo generate-lockfile
            cd ../client

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json ../server/Cargo.toml ../server/Cargo.lock
            git commit -m "chore: bump version to $VERSION"
            git push
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Linux Binary
        uses: actions/download-artifact@v8
        with:
          name: server-linux
          path: client/server-bin/linux/

      - name: Download Windows Binary
        uses: actions/download-artifact@v8
        with:
          name: server-win.exe
          path: client/server-bin/win/

      - name: Download macOS ARM64 Binary
        uses: actions/download-artifact@v8
        with:
          name: server-macos-arm64
          path: client/server-bin/macos-arm64/

      - name: Extract Release Notes
        run: |
          python .github/scripts/extract_release_notes.py > release_notes.md

      - name: Prepare Binaries
        run: |
          mkdir -p client/server-bin
          mv client/server-bin/linux/server client/server-bin/server-linux
          mv client/server-bin/win/server.exe client/server-bin/server-win.exe
          mv client/server-bin/macos-arm64/server client/server-bin/server-macos-arm64
          chmod +x client/server-bin/server-linux client/server-bin/server-macos-arm64
          cp -r server/assets client/server-bin/
          mv README.md client/README.md
          mv CHANGELOG.md client/CHANGELOG.md

      - name: Package VSIX
        run: |
          cd client
          npm run compile
          npx vsce package -o ../hearts-of-modding-${{ steps.bump.outputs.VERSION }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.bump.outputs.VERSION }}
          name: v${{ steps.bump.outputs.VERSION }}
          files: hearts-of-modding-${{ steps.bump.outputs.VERSION }}.vsix
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.bump.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Open VSX Registry
        run: |
          npx ovsx publish hearts-of-modding-${{ steps.bump.outputs.VERSION }}.vsix --pat ${{ secrets.OPEN_VSX_TOKEN }}
